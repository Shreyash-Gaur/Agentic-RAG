version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agentic_backend
    ports:
      - "8000:8000"
    volumes:
      # Persist all database files across container restarts
      - ./backend/db:/app/backend/db
      - ./knowledge:/app/knowledge

    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      # Allows the container to reach host.docker.internal on Linux
      - "host.docker.internal:host-gateway"
    # Remove the deploy block entirely if you don't have an Nvidia GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agentic_frontend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend